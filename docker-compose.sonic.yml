services:
  audiomuse-redis:
    image: redis:7-alpine
    container_name: audiomuse-redis
    volumes:
      - ${GROOVARR_DATA_DIR:-./groovarr-data}/audiomuse/redis:/data
    restart: unless-stopped
    networks:
      - internal

  audiomuse-postgres:
    image: postgres:15-alpine
    container_name: audiomuse-postgres
    environment:
      POSTGRES_DB: ${AUDIOMUSE_POSTGRES_DB:-audiomusedb}
      POSTGRES_USER: ${AUDIOMUSE_POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${AUDIOMUSE_POSTGRES_PASSWORD:-audiomusepassword}
    volumes:
      - ${GROOVARR_DATA_DIR:-./groovarr-data}/audiomuse/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUDIOMUSE_POSTGRES_USER:-audiomuse} -d ${AUDIOMUSE_POSTGRES_DB:-audiomusedb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

  audiomuse:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse
    environment:
      SERVICE_TYPE: flask
      TZ: ${TZ:-UTC}
      MEDIASERVER_TYPE: navidrome
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_USER: ${NAVIDROME_USERNAME}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
      POSTGRES_USER: ${AUDIOMUSE_POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${AUDIOMUSE_POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: ${AUDIOMUSE_POSTGRES_DB:-audiomusedb}
      POSTGRES_HOST: audiomuse-postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://audiomuse-redis:6379/0
      AI_MODEL_PROVIDER: ${AUDIOMUSE_AI_MODEL_PROVIDER:-NONE}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SERVER_URL: ${AUDIOMUSE_OPENAI_SERVER_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_MODEL_NAME: ${AUDIOMUSE_OPENAI_MODEL_NAME:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CLAP_ENABLED: ${AUDIOMUSE_CLAP_ENABLED:-true}
      USE_GPU_CLUSTERING: ${AUDIOMUSE_USE_GPU_CLUSTERING:-false}
      CLUSTER_ALGORITHM: ${AUDIOMUSE_CLUSTER_ALGORITHM:-kmeans}
      CLUSTERING_RUNS: ${AUDIOMUSE_CLUSTER_RUNS:-300}
      NUM_CLUSTERS_MIN: ${AUDIOMUSE_CLUSTER_NUM_MIN:-16}
      NUM_CLUSTERS_MAX: ${AUDIOMUSE_CLUSTER_NUM_MAX:-28}
      MAX_DISTANCE: ${AUDIOMUSE_CLUSTER_MAX_DISTANCE:-0.8}
      MAX_SONGS_PER_ARTIST: ${AUDIOMUSE_CLUSTER_MAX_SONGS_PER_ARTIST:-5}
      MIN_PLAYLIST_SIZE_FOR_TOP_N: ${AUDIOMUSE_CLUSTER_MIN_PLAYLIST_SIZE:-8}
      TOP_N_PLAYLISTS: ${AUDIOMUSE_CLUSTER_TOP_N_PLAYLISTS:-12}
      TEMP_DIR: /app/temp_audio
    volumes:
      - ${GROOVARR_DATA_DIR:-./groovarr-data}/audiomuse/temp-flask:/app/temp_audio
    depends_on:
      audiomuse-redis:
        condition: service_started
      audiomuse-postgres:
        condition: service_healthy
    networks:
      - internal
      - integration
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/ > /dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  audiomuse-worker:
    image: ghcr.io/neptunehub/audiomuse-ai:latest
    container_name: audiomuse-worker
    environment:
      SERVICE_TYPE: worker
      TZ: ${TZ:-UTC}
      MEDIASERVER_TYPE: navidrome
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_USER: ${NAVIDROME_USERNAME}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
      POSTGRES_USER: ${AUDIOMUSE_POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${AUDIOMUSE_POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: ${AUDIOMUSE_POSTGRES_DB:-audiomusedb}
      POSTGRES_HOST: audiomuse-postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://audiomuse-redis:6379/0
      AI_MODEL_PROVIDER: ${AUDIOMUSE_AI_MODEL_PROVIDER:-NONE}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SERVER_URL: ${AUDIOMUSE_OPENAI_SERVER_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_MODEL_NAME: ${AUDIOMUSE_OPENAI_MODEL_NAME:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      CLAP_ENABLED: ${AUDIOMUSE_CLAP_ENABLED:-true}
      USE_GPU_CLUSTERING: ${AUDIOMUSE_USE_GPU_CLUSTERING:-false}
      CLUSTER_ALGORITHM: ${AUDIOMUSE_CLUSTER_ALGORITHM:-kmeans}
      CLUSTERING_RUNS: ${AUDIOMUSE_CLUSTER_RUNS:-300}
      NUM_CLUSTERS_MIN: ${AUDIOMUSE_CLUSTER_NUM_MIN:-16}
      NUM_CLUSTERS_MAX: ${AUDIOMUSE_CLUSTER_NUM_MAX:-28}
      MAX_DISTANCE: ${AUDIOMUSE_CLUSTER_MAX_DISTANCE:-0.8}
      MAX_SONGS_PER_ARTIST: ${AUDIOMUSE_CLUSTER_MAX_SONGS_PER_ARTIST:-5}
      MIN_PLAYLIST_SIZE_FOR_TOP_N: ${AUDIOMUSE_CLUSTER_MIN_PLAYLIST_SIZE:-8}
      TOP_N_PLAYLISTS: ${AUDIOMUSE_CLUSTER_TOP_N_PLAYLISTS:-12}
      TEMP_DIR: /app/temp_audio
    volumes:
      - ${GROOVARR_DATA_DIR:-./groovarr-data}/audiomuse/temp-worker:/app/temp_audio
    depends_on:
      audiomuse-redis:
        condition: service_started
      audiomuse-postgres:
        condition: service_healthy
    networks:
      - internal
      - integration
    restart: unless-stopped
